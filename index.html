<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYC Walking Guide</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        
        /* Button Styles */
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-primary { background: #0070f3; color: white; }
        .btn-secondary { background: #e0e0e0; color: #333; }
        .btn-maps { background: #34a853; color: white; display: none; text-decoration: none; line-height: 45px; }
        
        #result { margin-top: 25px; line-height: 1.6; font-size: 18px; min-height: 50px; }
        .coords-display { color: #666; font-size: 12px; margin-top: 10px; height: 15px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🗽 NYC Guide</h1>
        <p>Stand on a corner and tap below:</p>
        
        <button class="btn-primary" onclick="getLocation()">Where am I?</button>
        
        <a id="maps-link" class="btn-maps" target="_blank">🗺️ View on Google Maps</a>
        
        <button class="btn-secondary" onclick="resetPage()">Reset</button>

        <div id="result">Your recommendation will appear here...</div>
        <div id="coords-display" class="coords-display"></div>
    </div>

    <script>
        function getLocation() {
            const res = document.getElementById('result');
            res.innerHTML = "Fetching your location... 📡";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(showPosition, () => {
                    res.innerHTML = "❌ Error: Please enable location permissions.";
                });
            } else {
                res.innerHTML = "❌ Geolocation is not supported by this browser.";
            }
        }

        function showPosition(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            
            // 1. Update the GPS text
            document.getElementById('coords-display').innerHTML = `GPS: ${lat.toFixed(4)}, ${lon.toFixed(4)}`;
            
            // 2. Build the Google Maps URL and show the button
            const mapsBtn = document.getElementById('maps-link');
            mapsBtn.href = `https://www.google.com/maps?q=${lat},${lon}`;
            mapsBtn.style.display = "block";
            
            // 3. Recommendation Logic
            const res = document.getElementById('result');
            if (lat >= 40.741 && lat <= 40.765) {
                res.innerHTML = "📍 <b>Midtown</b><br>You're near the Empire State Building! Head to 32nd St for Koreatown BBQ.";
            } else if (lat < 40.73) {
                res.innerHTML = "📍 <b>Downtown</b><br>You're in the village area. Perfect time for a slice of Joe's Pizza.";
            } else if (lat > 40.77) {
                res.innerHTML = "📍 <b>Uptown</b><br>Museum Mile is right here. Check out the Guggenheim.";
            } else {
                res.innerHTML = "📍 <b>NYC Explorer</b><br>The city is your oyster! Follow the crowd to the nearest subway.";
            }
        }

        // The Reset Function
        function resetPage() {
            document.getElementById('result').innerHTML = "Your recommendation will appear here...";
            document.getElementById('coords-display').innerHTML = "";
            document.getElementById('maps-link').style.display = "none";
        }
    </script>
</body>
</html>
