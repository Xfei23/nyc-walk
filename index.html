<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYC Walking Guide</title>
    <!-- Leaflet CSS & JS for the Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-primary { background: #0070f3; color: white; }
        .btn-secondary { background: #e0e0e0; color: #333; }
        
        /* Map and Filters */
        #map { height: 250px; width: 100%; margin-top: 15px; border-radius: 8px; display: none; z-index: 1;}

        .filter-group { display: none; justify-content: space-around; margin: 20px 0 10px; }
        .filter-btn { padding: 8px; width: 30%; font-size: 14px; margin: 0; background: #eee; color: #333; border-radius: 20px; }
        .filter-btn.active { background: #0070f3; color: white; }

        /* Recommendation List */
        .rec-list { list-style: none; padding: 0; text-align: left; }
        .rec-item { padding: 15px 0; border-bottom: 1px solid #eee; }
        .rec-item:last-child { border-bottom: none; }
        .rec-title { font-weight: bold; font-size: 16px; color: #333; display: flex; justify-content: space-between; align-items: center; }
        .rec-meta { font-size: 13px; color: #666; margin: 6px 0; }
        .rec-desc { font-size: 14px; color: #444; }
        .badge { font-size: 11px; padding: 3px 8px; border-radius: 12px; color: white; font-weight: normal; }
        .badge.food { background: #ff9800; }
        .badge.activity { background: #34a853; }
        .map-link { display: inline-block; margin-top: 8px; font-size: 13px; color: #0070f3; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🗽 NYC Guide</h1>
        <p>Stand on a corner and tap below:</p>
        
        <button class="btn-primary" onclick="getLocation()">Where am I? (GPS)</button>

        <p style="margin: 15px 0 5px; font-size: 14px; color: #666;">Or enter coordinates manually:</p>
        <div style="display:flex; gap:10px;">
           <input type="text" id="manual-coords" placeholder="e.g. 40.7484, -73.9857" style="flex:1; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-family: inherit;">
           <button class="btn-secondary" onclick="getManualLocation()" style="width:auto; margin:0; background: #6c757d; color: white; padding:10px 15px;">Search</button>
        </div>
        
        <!-- The Map -->
        <div id="map"></div>

        <!-- The Filters -->
        <div id="filter-group" class="filter-group">
            <button class="filter-btn active" onclick="setFilter('All', this)">All</button>
            <button class="filter-btn" onclick="setFilter('Food', this)">🍔 Food</button>
            <button class="filter-btn" onclick="setFilter('Activity', this)">🏛️ Activities</button>
        </div>

        <!-- Results output -->
        <div id="result" style="margin-top:15px;">Your recommendation will appear here...</div>

        <button class="btn-secondary" onclick="resetPage()" style="margin-top:20px;">Reset Everything</button>
    </div>

    <script>
        let currentLat = null;
        let currentLon = null;
        let currentActiveList = [];
        let map = null;
        let markers = [];
        let currentFilter = 'All';

        // Databases updated with exact latitude/longitude coordinates to allow Haversine distance calculations
        const midtown = [
            { name: "The Halal Guys", type: "Food", cost: "$", rating: "4.5", address: "53rd & 6th Ave", desc: "Legendary chicken & rice.", lat: 40.7618, lon: -73.9776 },
            { name: "2 Bros Pizza", type: "Food", cost: "$", rating: "4.0", address: "8th Ave & 38th", desc: "Quintessential $1.50 street slice.", lat: 40.7543, lon: -73.9924 },
            { name: "The High Line", type: "Activity", cost: "Free", rating: "4.8", address: "34th St", desc: "Elevated freight rail park.", lat: 40.7554, lon: -74.0041 },
            { name: "Los Tacos No. 1", type: "Food", cost: "$", rating: "4.7", address: "229 W 43rd St", desc: "Authentic cheap tacos.", lat: 40.7570, lon: -73.9877 },
            { name: "NY Public Library", type: "Activity", cost: "Free", rating: "4.9", address: "476 5th Ave", desc: "Stunning architecture.", lat: 40.7532, lon: -73.9822 },
            { name: "Bryant Park", type: "Activity", cost: "Free", rating: "4.8", address: "42nd & 6th Ave", desc: "Green oasis in skyscrapers.", lat: 40.7536, lon: -73.9832 },
            { name: "Margon", type: "Food", cost: "$", rating: "4.6", address: "136 W 46th St", desc: "Massive plates of Cuban food.", lat: 40.7580, lon: -73.9840 },
            { name: "Grand Central", type: "Activity", cost: "Free", rating: "4.8", address: "89 E 42nd St", desc: "Celestial ceiling in concourse.", lat: 40.7527, lon: -73.9772 },
            { name: "Empanada Mama", type: "Food", cost: "$", rating: "4.5", address: "765 9th Ave", desc: "Filling Colombian empanadas.", lat: 40.7635, lon: -73.9885 },
            { name: "Burger Joint", type: "Food", cost: "$$", rating: "4.3", address: "119 W 56th St", desc: "Hidden behind a curtain.", lat: 40.7638, lon: -73.9785 }
        ];

        const downtown = [
            { name: "Mamoun's Falafel", type: "Food", cost: "$", rating: "4.6", address: "119 MacDougal", desc: "Oldest NYC falafel.", lat: 40.7303, lon: -74.0004 },
            { name: "Staten Island Ferry", type: "Activity", cost: "Free", rating: "4.7", address: "Whitehall", desc: "Best views of the Statue.", lat: 40.7024, lon: -74.0125 },
            { name: "Joe's Pizza", type: "Food", cost: "$", rating: "4.6", address: "7 Carmine St", desc: "Classic Village slice.", lat: 40.7306, lon: -74.0021 },
            { name: "Washington Sq Park", type: "Activity", cost: "Free", rating: "4.8", address: "Village", desc: "Iconic arch & people-watching.", lat: 40.7308, lon: -73.9973 },
            { name: "Wah Fung No 1", type: "Food", cost: "$", rating: "4.8", address: "79 Chrystie St", desc: "Massive roast pork portions.", lat: 40.7173, lon: -73.9944 },
            { name: "Brooklyn Bridge", type: "Activity", cost: "Free", rating: "4.9", address: "City Hall", desc: "Walk across the iconic bridge.", lat: 40.7128, lon: -74.0041 },
            { name: "Vanessa's Dumpling", type: "Food", cost: "$", rating: "4.4", address: "118 Eldridge", desc: "Delicious pan-fried dumpings.", lat: 40.7183, lon: -73.9918 },
            { name: "Tompkins Sq Bagels", type: "Food", cost: "$", rating: "4.5", address: "165 Ave A", desc: "Fresh bagels & cream cheese.", lat: 40.7275, lon: -73.9818 },
            { name: "9/11 Memorial", type: "Activity", cost: "Free", rating: "4.9", address: "180 Greenwich", desc: "Moving outdoor memorial pools.", lat: 40.7115, lon: -74.0133 },
            { name: "Kopitiam", type: "Food", cost: "$", rating: "4.6", address: "151 E Broadway", desc: "Malaysian coffeehouse snacks.", lat: 40.7139, lon: -73.9918 }
        ];

        const uptown = [
            { name: "Absolute Bagels", type: "Food", cost: "$", rating: "4.7", address: "2788 Broadway", desc: "Best bagel in Manhattan.", lat: 40.8025, lon: -73.9674 },
            { name: "Central Park Reservoir", type: "Activity", cost: "Free", rating: "4.8", address: "86th St", desc: "Gorgeous running track.", lat: 40.7858, lon: -73.9602 },
            { name: "Koronet Pizza", type: "Food", cost: "$", rating: "4.3", address: "2848 Broadway", desc: "Hilariously massive slices.", lat: 40.8049, lon: -73.9667 },
            { name: "Columbia Univ.", type: "Activity", cost: "Free", rating: "4.7", address: "116th St", desc: "Beautiful neoclassical campus.", lat: 40.8075, lon: -73.9626 },
            { name: "Roti Roll", type: "Food", cost: "$", rating: "4.6", address: "994 Amsterdam", desc: "Curries in warm parathas.", lat: 40.8018, lon: -73.9677 },
            { name: "Grant's Tomb", type: "Activity", cost: "Free", rating: "4.5", address: "122nd St", desc: "Largest NA mausoleum.", lat: 40.8133, lon: -73.9634 },
            { name: "Taqueria y Fonda", type: "Food", cost: "$", rating: "4.5", address: "968 Amsterdam", desc: "Authentic Mexican comfort.", lat: 40.8005, lon: -73.9680 },
            { name: "Riverside Park", type: "Activity", cost: "Free", rating: "4.7", address: "Hudson River", desc: "Quieter than Central Park.", lat: 40.8000, lon: -73.9740 },
            { name: "Hungarian Pastry Shop", type: "Food", cost: "$", rating: "4.6", address: "1030 Amsterdam", desc: "Old-school cafe for students.", lat: 40.8045, lon: -73.9631 },
            { name: "Levain Bakery", type: "Food", cost: "$$", rating: "4.8", address: "167 W 74th St", desc: "World-famous 6oz cookies.", lat: 40.7799, lon: -73.9803 }
        ];

        const generic = [
            { name: "NYC Ferry", type: "Activity", cost: "$4", rating: "4.8", address: "Pier 11", desc: "Sightseeing cruise.", lat: 40.7045, lon: -74.0069 },
            { name: "Flushing Meadows", type: "Activity", cost: "Free", rating: "4.6", address: "Queens", desc: "Iconic Unisphere & history.", lat: 40.7400, lon: -73.8407 },
            { name: "L'Industrie Pizzeria", type: "Food", cost: "$", rating: "4.8", address: "254 S 2nd St", desc: "New school Brooklyn slice.", lat: 40.7115, lon: -73.9610 },
            { name: "Roosevelt Island Tram", type: "Activity", cost: "$2.90", rating: "4.7", address: "E 59th St", desc: "Suspended cable car.", lat: 40.7610, lon: -73.9642 },
            { name: "Los Mariscos", type: "Food", cost: "$", rating: "4.7", address: "Chelsea Market", desc: "Amazing cheap fish tacos.", lat: 40.7424, lon: -74.0060 },
            { name: "Prospect Park", type: "Activity", cost: "Free", rating: "4.8", address: "Brooklyn", desc: "Wilder than Central Park.", lat: 40.6602, lon: -73.9690 },
            { name: "Tacos El Bronco", type: "Food", cost: "$", rating: "4.7", address: "Sunset Park", desc: "Best authentic outer-borough taco.", lat: 40.6465, lon: -74.0112 },
            { name: "Williamsburg Bridge", type: "Activity", cost: "Free", rating: "4.6", address: "Delancey St", desc: "Walk covered in street art.", lat: 40.7135, lon: -73.9670 },
            { name: "Jackson Diner", type: "Food", cost: "$$", rating: "4.4", address: "Jackson Hts", desc: "Famous Indian buffet.", lat: 40.7483, lon: -73.8845 },
            { name: "Astoria Park", type: "Activity", cost: "Free", rating: "4.7", address: "Astoria", desc: "Views of Triborough Bridge.", lat: 40.7788, lon: -73.9213 }
        ];

        // Haversine Distance Formula (calculates miles between two GPS points)
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 3958.8; // Earth radius in miles
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = 
                0.5 - Math.cos(dLat)/2 + 
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
                (1 - Math.cos(dLon))/2;
            return R * 2 * Math.asin(Math.sqrt(a));
        }

        // Initialize and Update Leaflet Map
        function updateMap(lat, lon, places) {
            document.getElementById('map').style.display = "block";
            
            if (!map) {
                map = L.map('map').setView([lat, lon], 14);
                // Free, clean map tiles
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; OpenStreetMap &copy; CARTO'
                }).addTo(map);
            } else {
                map.setView([lat, lon], 14);
            }

            // Clear old markers completely
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            // Add User Pin (Blue)
            const userIcon = L.icon({
                iconUrl: 'https://cdn-icons-png.flaticon.com/512/1004/1004093.png',
                iconSize: [30, 30]
            });
            const userMarker = L.marker([lat, lon], {icon: userIcon}).addTo(map).bindPopup("<b>📍 You are here</b>").openPopup();
            markers.push(userMarker);

            // Add Destination Pins (Default leaflet blue/grey)
            places.forEach((p, idx) => {
                const marker = L.marker([p.lat, p.lon]).addTo(map).bindPopup(`<b>${idx + 1}. ${p.name}</b><br>${p.desc}`);
                markers.push(marker);
            });
        }

        // Handle the visual switching of Filter Tabs
        function setFilter(type, btnElement) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
            renderUI();
        }

        // The core rendering engine
        function renderUI() {
            if (!currentLat || !currentLon || !currentActiveList.length) return;

            // 1. Calculate Exact Distance & Optionally Filter
            let processedList = currentActiveList.map(item => {
                return { ...item, dist: getDistance(currentLat, currentLon, item.lat, item.lon) };
            });

            if (currentFilter !== 'All') {
                processedList = processedList.filter(item => item.type === currentFilter);
            }

            // 2. Sort by nearest distance first!
            processedList.sort((a, b) => a.dist - b.dist);

            // 3. Render the HTML List
            const res = document.getElementById('result');
            let html = '<ul class="rec-list">';
            if (processedList.length === 0) {
                html += '<p>No places match this filter nearby.</p>';
            }

            processedList.forEach((item, index) => {
                const badgeClass = item.type === 'Activity' ? 'activity' : 'food';
                
                // Deep link right into Google Maps routing
                const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${item.lat},${item.lon}`;
                
                html += `
                    <li class="rec-item">
                        <div class="rec-title">
                            <span>${index + 1}. ${item.name}</span>
                            <span class="badge ${badgeClass}">${item.type}</span>
                        </div>
                        <div class="rec-meta">
                            📍 <b>${item.dist.toFixed(2)} mi away</b> &nbsp;•&nbsp; ⭐ ${item.rating} &nbsp;•&nbsp; 💰 ${item.cost}
                        </div>
                        <div class="rec-desc">${item.desc}</div>
                        <a href="${mapsUrl}" target="_blank" class="map-link">🗺️ Google Maps Directions →</a>
                    </li>
                `;
            });
            html += '</ul>';
            res.innerHTML = html;

            // 4. Update the visual Leaflet map above the list
            updateMap(currentLat, currentLon, processedList);
        }

        // Gateway for taking coordinates and setting the app state
        function triggerLocationProcessing(lat, lon) {
            currentLat = lat;
            currentLon = lon;

            const res = document.getElementById('result');
            
            // NYC bounds check
            if (lat < 40.47 || lat > 40.91 || lon < -74.25 || lon > -73.70) {
                document.getElementById('map').style.display = "none";
                document.getElementById('filter-group').style.display = "none";
                res.innerHTML = "❌ <b>Out of Bounds</b><br>This guide only works within the 5 boroughs of New York City.";
                return;
            }

            document.getElementById('filter-group').style.display = "flex";

            if (lat >= 40.741 && lat <= 40.765) currentActiveList = midtown;
            else if (lat < 40.73) currentActiveList = downtown;
            else if (lat > 40.77) currentActiveList = uptown;
            else currentActiveList = generic;

            renderUI();
        }

        // Triggered by GPS Button
        function getLocation() {
            document.getElementById('result').innerHTML = "Fetching your location... 📡";
            const options = { enableHighAccuracy: false, timeout: 10000, maximumAge: 60000 };
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => triggerLocationProcessing(pos.coords.latitude, pos.coords.longitude), 
                    err => { document.getElementById('result').innerHTML = "❌ Error: " + (err.message || "Could not fetch location."); }, 
                    options
                );
            }
        }

        // Triggered by Manual Search Button
        function getManualLocation() {
            const input = document.getElementById('manual-coords').value;
            const parts = input.replace(/\s+/g, '').split(',');
            if (parts.length !== 2 || isNaN(parts[0]) || isNaN(parts[1])) {
                document.getElementById('result').innerHTML = "❌ <b>Format Error</b><br>Enter valid numbers like: 40.7484, -73.9857";
                return;
            }
            triggerLocationProcessing(parseFloat(parts[0]), parseFloat(parts[1]));
        }

        // General UI Reset
        function resetPage() {
            currentLat = null;
            currentLon = null;
            document.getElementById('result').innerHTML = "Your recommendation will appear here...";
            document.getElementById('manual-coords').value = "";
            document.getElementById('filter-group').style.display = "none";
            document.getElementById('map').style.display = "none";
            
            // Destroy the map instance so it can spawn cleanly next time
            if (map) { map.remove(); map = null; }
        }
    </script>
</body>
</html>
