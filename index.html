<!DOCTYPE html>
<html>
<head>
    <title>NYC Walking Guide</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; }
        input { padding: 10px; width: 250px; margin: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: #0070f3; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #result { margin-top: 20px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🗽 NYC Recommendations</h1>
        <p>Paste your coordinates (Lat, Lon):</p>
        <input type="text" id="coords" placeholder="e.g. 40.7484, -73.9857">
        <br>
        <button onclick="getRecommendation()">Find What's Nearby</button>
        <div id="result"></div>
    </div>

    <script>
        function getRecommendation() {
            const input = document.getElementById('coords').value;
            const resultDiv = document.getElementById('result');
            
            // Simple logic: If the latitude starts with 40.75, you're near Midtown!
            if (input.includes("40.75") || input.includes("40.74")) {
                resultDiv.innerHTML = "📍 You're near the Empire State Building! <br> Go grab a bagel at Best Bagel & Coffee on 35th St.";
            } else if (input.includes("40.70")) {
                resultDiv.innerHTML = "📍 You're Downtown! <br> Walk over to the Stone Street historic district for dinner.";
            } else if (input.includes("40.80")) {
                resultDiv.innerHTML = "📍 You're near Central Park North! <br> Check out the Conservatory Garden.";
            } else {
                resultDiv.innerHTML = "Exploring a new corner of NYC? Keep walking toward Manhattan!";
            }
        }
    </script>
</body>
</html>
